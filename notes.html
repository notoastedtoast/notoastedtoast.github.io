<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Notes</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #627081;
      --paper: #fbfaf7;
      --mint: #d7f0e3;
      --coral: #ffd8cf;
      --gold: #f6e6a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 33, 43, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(23, 33, 43, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 34px 34px;
    }

    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    a {
      color: inherit;
    }

    .back {
      display: inline-flex;
      margin-bottom: 24px;
      padding: 10px 14px;
      border: 2px solid var(--ink);
      background: #fff;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 4px 4px 0 rgba(23, 33, 43, 0.16);
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .notes {
      display: grid;
      gap: 18px;
      padding: 18px;
      border: 2px solid var(--ink);
      background: #263646;
      box-shadow: 10px 10px 0 #e2c86f;
    }

    .note {
      min-height: 112px;
      padding: 20px;
      border: 1px solid rgba(23, 33, 43, 0.35);
      background: #fff;
    }

    .note:nth-child(2) {
      background: var(--mint);
    }

    .note:nth-child(3) {
      background: var(--coral);
    }

    .note strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    .note span {
      color: #43505d;
      line-height: 1.55;
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 22px, 640px);
        padding: 18px 0 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">Back to landing</a>
    <h1>Random Notes</h1>

    <section class="notes" aria-label="Random notes">
      <div class="note">
        <strong>Today's tiny theory</strong>
        <span>Water tastes better at 2 a.m. because silence improves the flavor.</span>
      </div>
      <div class="note">
        <strong>Desk status</strong>
        <span>One notebook, two pens, three tabs open, and one mysterious cable.</span>
      </div>
      <div class="note">
        <strong>Useful nonsense</strong>
        <span>A playlist can turn chores into a fake movie montage.</span>
      </div>
    </section>
  </main>
</body>
</html>
