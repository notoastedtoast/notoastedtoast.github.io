<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randomness Meter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #627081;
      --paper: #fbfaf7;
      --gold: #f6e6a8;
      --green: #245b45;
      --blue: #244d7a;
      --red: #884033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 33, 43, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(23, 33, 43, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 34px 34px;
    }

    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .back {
      display: inline-flex;
      margin-bottom: 24px;
      padding: 10px 14px;
      border: 2px solid var(--ink);
      background: #fff;
      color: inherit;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 4px 4px 0 rgba(23, 33, 43, 0.16);
    }

    .meter-page {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 24px;
      align-items: center;
      padding: 28px;
      border: 2px solid var(--ink);
      background: #ffffff;
      box-shadow: 10px 10px 0 #e2c86f;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .meter {
      display: grid;
      gap: 14px;
    }

    .bar {
      height: 24px;
      border: 1px solid var(--ink);
      background: #fff;
    }

    .bar span {
      display: block;
      height: 100%;
      background: var(--green);
    }

    .bar:nth-child(2) span {
      width: 72%;
      background: var(--blue);
    }

    .bar:nth-child(3) span {
      width: 46%;
      background: var(--red);
    }

    .bar:nth-child(4) span {
      width: 88%;
      background: #9c7b21;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 22px, 640px);
        padding: 18px 0 28px;
      }

      .meter-page {
        grid-template-columns: 1fr;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">Back to landing</a>

    <section class="meter-page" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">Randomness Meter</h1>
        <p>
          A very unofficial measurement of how much assorted stuff is happening here.
        </p>
      </div>
      <div class="meter" aria-label="Decorative randomness meter">
        <div class="bar"><span style="width: 64%;"></span></div>
        <div class="bar"><span></span></div>
        <div class="bar"><span></span></div>
        <div class="bar"><span></span></div>
      </div>
    </section>
  </main>
</body>
</html>
